name: auto-scan

# Runs a Deep Analyse on a fixed watchlist by driving the live dashboard headlessly,
# so the AI committee's verdicts + setup_features vectors keep accumulating in
# apex_research_memory with nobody clicking Analyse. This is what feeds the
# confidence-calibration and structural meta-label loops (both are dormant until
# enough resolved, feature-tagged rows exist). Each scan also resolves prior open
# outcomes. No keys needed — it uses the deployed site, which holds the AI keys
# server-side.
#
# Cadence: ONCE daily. The script picks a coverage-weighted RANDOM subset of the
# universe and decides eligibility itself by day (weekends + US holidays → crypto only,
# since stocks/FX are closed; weekdays → all asset classes), so the workflow no longer
# needs day-specific branches. The dashboard refreshes the same open row for same-
# direction same-UTC-day re-scans (anti-duplicate), so it never double-counts.

on:
  schedule:
    - cron: "7 22 * * *"       # daily 22:00 UTC (after US close → daily bars fresh)
  workflow_dispatch:
    inputs:
      symbols:
        description: "Comma-separated list (overrides the random rotation)"
        required: false
        default: ""
      count:
        description: "How many to scan this run (default 16)"
        required: false
        default: ""

jobs:
  auto-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Playwright (Chromium)
        run: |
          npm i --no-save playwright@1.49.1
          npx playwright install --with-deps chromium
      - name: Run auto-scan
        # Empty inputs → the script rotates randomly over today's eligible pool.
        env:
          APEX_SCAN_SYMBOLS: ${{ github.event.inputs.symbols || '' }}
          APEX_SCAN_COUNT: ${{ github.event.inputs.count || '' }}
        run: node scripts/auto-scan.mjs
