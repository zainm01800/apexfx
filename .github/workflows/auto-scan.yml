name: auto-scan

# Runs Deep Analyses by driving the live dashboard headlessly, so the AI committee's
# verdicts + setup_features vectors keep accumulating in apex_research_memory with
# nobody clicking Analyse. This feeds the confidence-calibration and structural
# meta-label loops. Each scan also resolves prior open outcomes. No keys needed —
# it uses the deployed site, which holds the AI keys server-side.
#
# Cadence: TWICE daily on weekdays, once on weekends — ~200 scans/week total across
# ALL four trade styles, allocated per the learning-loop research (intraday 30% /
# swing 30% / scalp 20% / position 20%):
#   - midday  (12:17 UTC, Mon–Fri): scalp 6 + intraday 10 — US + London markets are
#     OPEN, which scalp/intraday need; these resolve in hours–days (fast learning).
#   - evening (19:47 UTC, daily):   swing 10 + position 6 on fresh post-close daily
#     bars; weekends/US holidays the script itself switches to crypto-only, all four
#     styles (5 each). Re-validation of open trades runs in the evening only.
# The script excludes instrument×style cells that already have an OPEN trade
# (pseudo-replication guard) and re-validates those instead.

on:
  schedule:
    - cron: "17 12 * * 1-5"       # midday run on weekdays (scalp/intraday, markets open)
    - cron: "47 19 * * *"         # evening run daily (swing/position check and weekend crypto check)
  workflow_dispatch:
    inputs:
      symbols:
        description: "Comma-separated list (overrides the random rotation)"
        required: false
        default: ""
      mix:
        description: "Style mix e.g. scalp:4,intraday:8 (overrides the mode default)"
        required: false
        default: ""

jobs:
  auto-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Playwright (Chromium)
        run: |
          npm i --no-save playwright@1.49.1
          npx playwright install --with-deps chromium
      - name: Run auto-scan
        env:
          APEX_SCAN_SYMBOLS: ${{ github.event.inputs.symbols || '' }}
          APEX_SCAN_MIX: ${{ github.event.inputs.mix || '' }}
          APEX_REVALIDATE_MAX: '10'
        run: node scripts/auto-scan.mjs
