name: paper-portfolio

# Daily forward paper step for the FROZEN multi-asset trend book (Book C,
# lookback 126 — pre-registered in engine/data_store/pre_registration_paper_trend_2026-07-17.md).
# The stepper is engine-simulated (no broker): each run tops up the parquet
# cache, restores the paper portfolio from the Supabase mirror, advances it one
# closed daily bar, and writes the state back to Supabase. Idempotent — only
# bars strictly before today 00:00 UTC are processed, so re-runs are no-ops.
#
# Scheduled daily 7x (not weekdays-only): crypto trades 365, so the weekend
# runs advance the crypto sleeve (the only class with weekend bars); equity/FX
# bars from Friday are processed by the Saturday run. No separate catch-up
# logic is needed — the stepper processes whatever new closed bars exist.

on:
  schedule:
    - cron: "30 23 * * *"     # 23:30 UTC daily — after US equity (20:00) and FX (21:00/22:00) closes
  workflow_dispatch: {}        # run on demand from the Actions tab

jobs:
  step:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: https://cuvchjhaojhmxfgczndy.supabase.co
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1dmNoamhhb2pobXhmZ2N6bmR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ4ODYwNzYsImV4cCI6MjEwMDQ2MjA3Nn0.liH06gqou8QD0ifOLbNDohZjP5dsEk_RzH1WaXf1wtM
      # Writers prefer the service-role key (2026-07-17 RLS lockdown: anon is SELECT-only)
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify Supabase tables exist (fail fast if not)
        run: |
          for t in apex_paper_positions apex_paper_daily; do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              "$SUPABASE_URL/rest/v1/$t?select=*&limit=1" \
              -H "apikey: $SUPABASE_ANON_KEY" -H "Authorization: Bearer $SUPABASE_ANON_KEY")
            echo "$t REST status: $code"
            if [ "$code" = "402" ]; then
              echo "::error::Supabase has RESTRICTED this project (HTTP 402 — egress/quota exceeded). Nothing is broken in the engine or IBKR: the database is refusing to serve. Restore service in the Supabase dashboard (upgrade plan or raise the spend cap), then re-run. The stepper is halted deliberately — advancing the book without its state would corrupt the forward test."
              exit 1
            fi
            if [ "$code" != "200" ]; then
              echo "::error::$t not reachable (HTTP $code). If the table is genuinely missing, run supabase/apex_paper_portfolio.sql in the Supabase SQL editor first."
              exit 1
            fi
          done
          echo "Tables OK — proceeding."
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: System deps (LightGBM OpenMP runtime)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgomp1
      - name: Install Python deps
        run: pip install -r engine/requirements.txt
      - name: Restore parquet price cache (history stays stable across runs)
        uses: actions/cache@v4
        with:
          # parquets + resolver-local state only — NOT paper_portfolio/state.json:
          # in CI the Supabase mirror is the single source of truth for portfolio
          # state. resolved_outcomes.json is the RESOLVER's own memory (processed
          # keys + entry-barrier snapshots of open positions); without it a close
          # still resolves, but with "derived" instead of exact barriers.
          path: |
            engine/data_store/*.parquet
            engine/data_store/paper_portfolio/resolved_outcomes.json
          key: paper-portfolio-data-${{ github.run_id }}
          restore-keys: paper-portfolio-data-
      - name: Advance the paper book one closed bar
        working-directory: engine
        run: python scripts/run_paper_portfolio.py
      - name: Nightly risk & ops pack (read-only; prints to log + uploads artifact)
        working-directory: engine
        run: python scripts/nightly_risk_report.py
      - name: Upload risk pack artifact
        uses: actions/upload-artifact@v4
        with:
          name: risk-pack-${{ github.run_id }}
          path: engine/data_store/reports/
          retention-days: 90
          if-no-files-found: warn
      - name: Resolve closed paper-book trades into research memory
        # READ-ONLY toward the book (state.json / apex_paper_*); writes only
        # apex_research_memory rows (source=paper_book, no ticket column — the
        # Bayesian sizing posterior must keep excluding them) + its own state
        # file. Runs AFTER the stepper so it sees today's closes; idempotent
        # (deterministic row ids + merge-duplicates), so a failed night is
        # simply re-resolved the next night. Hard-fails the job on error —
        # silent skips are how the qwen-404 lesson gap happened.
        working-directory: engine
        run: python scripts/resolve_paper_book_outcomes.py --apply
