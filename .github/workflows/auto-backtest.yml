name: auto-backtest

# Weekly retraining loop: re-runs the full backtest + CPCV/DSR/PBO sweep across the
# whole universe — forex pairs, equities, and crypto (the ML models refit on the
# latest data) — and upserts the results into the Supabase knowledge base, so the
# Deep Analyse keeps drawing on fresh, validated evidence. No LLM is used, so this
# costs nothing in API quota.

on:
  schedule:
    - cron: "17 6 * * 1"     # Mondays 06:17 UTC
  workflow_dispatch: {}        # run on demand from the Actions tab

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # full multi-asset universe (~46 instruments × 4 configs)
    env:
      SUPABASE_URL: https://cuvchjhaojhmxfgczndy.supabase.co
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1dmNoamhhb2pobXhmZ2N6bmR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ4ODYwNzYsImV4cCI6MjEwMDQ2MjA3Nn0.liH06gqou8QD0ifOLbNDohZjP5dsEk_RzH1WaXf1wtM
      # Writers prefer the service-role key (2026-07-17 RLS lockdown: anon is SELECT-only)
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify Supabase table exists (fail fast if not)
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/apex_backtests?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "apex_backtests REST status: $code"
          if [ "$code" != "200" ]; then
            echo "::error::apex_backtests not reachable (HTTP $code). Run supabase/backtests.sql in the Supabase SQL editor first."
            exit 1
          fi
          echo "Table OK — proceeding."
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: System deps (LightGBM OpenMP runtime)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgomp1
      - name: Install Python deps
        run: pip install -r engine/requirements.txt
      - name: Run backtest sweep -> Supabase knowledge base
        working-directory: engine
        run: python scripts/run_backtests.py
