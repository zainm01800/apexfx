# ============================================================================
# PROP-FIRM PROFILE — config.prop.yaml (rewritten 2026-07-22 as an overlay)
# ============================================================================
# For the FUTURE funded-account runner ONLY. Nothing loads this file today:
# the running paper test / engine reads config.yaml via get_config().
# Load explicitly with:  apex_quant.config.load_config("config.prop.yaml")
#
# This was a full COPY of config.yaml until 2026-07-22. That rotted the moment
# the base config changed — expanding the research universe made the two files
# differ in `data` as well as `risk`, which the drift test correctly caught.
# It now INHERITS from config.yaml and states only its deltas, so it can never
# drift again no matter how config.yaml evolves.
#
# Deltas vs config.yaml (everything else inherited verbatim):
#   risk.max_risk_per_trade      0.01   (unchanged — restated as a firm rule)
#   risk.max_portfolio_risk      0.065 -> 0.040  (firm daily-loss rule is 5%;
#                                aggregated open risk must sit well under it)
#   risk.drawdown_reducing_limit 0.10 -> 0.03    (de-risk ramp from 3% off peak)
#   risk.drawdown_breaker        0.20 -> 0.06    (halt NEW positions at 6% off
#                                peak. From-peak is >= from-cycle-start whenever
#                                equity made a new high, so this halts AT OR
#                                BEFORE the mandated -6%-from-cycle-start
#                                stand-down — a 2% buffer over the firm's -8%
#                                static floor)
#
# DECLARED BUT NOT ENFORCED (no engine knob exists as of 2026-07-22):
#   engine-level DAILY stop at 2.5% (half the firm's 5% daily cap). The risk
#   engine has no daily-loss circuit breaker — only from-peak drawdown zones.
#   The future prop runner MUST implement a daily equity check before this
#   profile is used with real money.
# ============================================================================

_extends: config.yaml

risk:
  max_risk_per_trade: 0.01
  max_portfolio_risk: 0.040
  drawdown_reducing_limit: 0.03
  drawdown_breaker: 0.06
